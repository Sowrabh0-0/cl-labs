services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      APP_DB_PATH: /app/data/app.db
      APP_SEED_PATH: /app/seed/seed.json
      APP_SESSION_SECRET: ${APP_SESSION_SECRET:-change-this-before-deploy}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-https://vdi.clahanlabs.com}
      GUACAMOLE_PUBLIC_URL: ${GUACAMOLE_PUBLIC_URL:-/guacamole}
    volumes:
      - backend-data:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-8088}:80"

volumes:
  backend-data:
