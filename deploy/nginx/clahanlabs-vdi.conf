# Host Nginx config for Azure VM where:
# - This application runs through Docker Compose on 127.0.0.1:8088
# - Apache Guacamole runs through Docker Compose on 127.0.0.1:8090/guacamole
#
# Copy to:
#   /etc/nginx/sites-available/clahanlabs-vdi
#
# Then:
#   sudo nginx -t
#   sudo systemctl reload nginx

server {
    listen 80;
    server_name *.clahanlabs.com clahanlabs.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name *.clahanlabs.com clahanlabs.com;

    ssl_certificate /etc/letsencrypt/live/clahanlabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clahanlabs.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    location /guacamole/ {
        proxy_pass http://127.0.0.1:8090/guacamole/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_request_buffering off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 14400s;
        proxy_send_timeout 14400s;
    }

    location = /guacamole {
        return 301 /guacamole/;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8088/api/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://127.0.0.1:8088/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
